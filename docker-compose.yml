services:
  db:
    image: postgres:16-alpine
    container_name: flyerwise_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flyerwise_db}
      POSTGRES_USER: ${POSTGRES_USER:-flyerwise_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flyerwise_pass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flyerwise_user} -d ${POSTGRES_DB:-flyerwise_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
